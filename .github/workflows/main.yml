name: ZapKart CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Check for merge conflicts
  # ─────────────────────────────────────────
  check-conflicts:
    name: 🔍 Check Merge Conflicts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for conflict markers
        run: |
          if grep -r "<<<<<<< " --include="*.py" .; then
            echo "❌ Merge conflicts found! Fix before pushing."
            exit 1
          fi
          echo "✅ No merge conflicts found"

  # ─────────────────────────────────────────
  # JOB 2: Test Backend with Coverage
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend + Coverage
    runs-on: ubuntu-latest
    needs: [check-conflicts]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=70
        env:
          DATABASE_URL: sqlite:///./zapkart_test.db
          SECRET_KEY: test-secret-key-for-ci-minimum-32-chars-long

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: zapkart-backend-coverage

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html-report
          path: backend/htmlcov/
          retention-days: 7

      - name: Comment coverage on PR
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70

  # ─────────────────────────────────────────
  # JOB 3: Test Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend Build
    runs-on: ubuntu-latest
    needs: [check-conflicts]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─────────────────────────────────────────
  # JOB 4: Build & Push Docker Images
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 5: Deploy to AWS EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/zapkart
            git pull origin main
            docker pull ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:latest
            docker-compose down
            docker-compose up -d
            sleep 10
            curl -f http://localhost:8000/api/health || exit 1
            echo "✅ Deployed successfully!"
