name: ZapKart CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test Backend
  # ─────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Seed test database
        working-directory: ./backend
        run: python -m app.db.seed
        env:
          DATABASE_URL: sqlite:///./zapkart_test.db
          SECRET_KEY: test-secret-key-for-ci

      - name: Run tests
        working-directory: ./backend
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./zapkart_test.db
          SECRET_KEY: test-secret-key-for-ci

  # ─────────────────────────────────────────
  # JOB 2: Test Frontend
  # ─────────────────────────────────────────
  test-frontend:
    name: 🧪 Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # ─────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4: Deploy to AWS EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting ZapKart deployment..."

            # Pull latest code
            cd ~/zapkart
            git pull origin main

            # Pull latest Docker images
            docker pull ${{ secrets.DOCKER_USERNAME }}/zapkart-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/zapkart-frontend:latest

            # Restart containers
            docker-compose down
            docker-compose up -d

            # Wait for backend to be healthy
            echo "Waiting for backend..."
            sleep 10

            # Health check
            curl -f http://localhost:8000/api/health || exit 1

            echo "✅ ZapKart deployed successfully!"

      - name: Notify deployment success
        if: success()
        run: echo "🎉 Deployment successful! App is live at http://${{ secrets.EC2_HOST }}"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ Deployment failed! Check the logs."
